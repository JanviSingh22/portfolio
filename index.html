<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Janvi Singh — Portfolio</title>
  <meta name="description" content="Portfolio of Janvi Singh — coder, learner, artist.">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Skip link for accessibility -->
  <a href="#main-content" class="skip-link">Skip to content</a>

  <!-- Landing overlay -->
  <section id="landing" class="landing" aria-label="Introduction animation">
    <div class="landing__text" aria-live="polite"></div>
    <div class="landing__cursor" aria-hidden="true"></div>
  </section>

  <!-- Main site (hidden until landing completes) -->
  <div id="main-content" class="main-wrapper" aria-hidden="true">

    <!-- Navigation -->
    <header class="nav" role="banner">
      <a href="#" class="nav__logo">JS</a>
      <nav class="nav__links" role="navigation" aria-label="Main navigation">
        <a href="#interests" class="nav__link" aria-current="false">Interests</a>
        <a href="#about" class="nav__link" aria-current="true">About</a>
        <a href="#coder" class="nav__link" aria-current="false">Coder</a>
      </nav>
      <button class="nav__theme-toggle" aria-label="Toggle night mode">🌙</button>
      <button class="nav__mobile-toggle" aria-label="Open menu" aria-expanded="false">☰</button>
    </header>

    <!-- About Section (base layer - always visible) -->
    <section id="about" class="section section--about" aria-label="About me">
      <div class="section__container">
        <!-- Rendered by ContentRenderer -->
      </div>
    </section>

    <!-- Interests Panel (slides from left) -->
    <section id="interests" class="section section--interests panel panel--left" aria-label="My interests" aria-hidden="true">
      <div class="panel__scroll">
        <div class="section__container">
          <div class="interests-grid" role="list">
            <!-- Cards rendered by ContentRenderer -->
          </div>
        </div>
        <div class="panel__footer-slot"></div>
      </div>
    </section>

    <!-- Coder Panel (slides from right) -->
    <section id="coder" class="section section--coder panel panel--right" aria-label="Developer profile" aria-hidden="true">
      <div class="panel__scroll">
        <div class="section__container">
          <!-- Skills, projects, timeline rendered by ContentRenderer -->
        </div>
        <div class="panel__footer-slot"></div>
      </div>
    </section>

    <!-- Footer -->
    <footer class="footer" role="contentinfo">
      <div class="footer__container">
        <!-- Contact Form -->
        <div class="footer__contact">
          <h3 class="footer__heading">Get in Touch</h3>
          <form class="footer__form" action="https://formspree.io/f/placeholder" method="POST" aria-label="Contact form">
            <div class="footer__form-group">
              <label for="contact-name" class="footer__label">Name</label>
              <input type="text" id="contact-name" name="name" class="footer__input" placeholder="Your name" required>
            </div>
            <div class="footer__form-group">
              <label for="contact-email" class="footer__label">Email</label>
              <input type="email" id="contact-email" name="email" class="footer__input" placeholder="you@example.com" required>
            </div>
            <div class="footer__form-group">
              <label for="contact-message" class="footer__label">Message</label>
              <textarea id="contact-message" name="message" class="footer__textarea" placeholder="Say hello..." rows="4" required></textarea>
            </div>
            <button type="submit" class="footer__submit">Send Message</button>
          </form>
        </div>

        <!-- Links & Info -->
        <div class="footer__info">
          <h3 class="footer__heading">Links</h3>
          <div class="footer__links">
            <a href="https://github.com/JanviSingh22" target="_blank" rel="noopener noreferrer" class="footer__link" aria-label="GitHub profile">
              <img src="github.png" alt="" class="footer__icon"> GitHub
            </a>
            <a href="#" class="footer__link" aria-label="Instagram profile">
              <img src="instagram.png" alt="" class="footer__icon"> Instagram
            </a>
          </div>
          <p class="footer__copyright">© 2024 Janvi Singh. Built with intention.</p>
        </div>
      </div>
    </footer>
  </div>

  <!-- Easter egg terminal overlay -->
  <div id="terminal-overlay" class="terminal" aria-hidden="true" role="dialog" aria-label="Secret terminal">
    <div class="terminal__header">terminal</div>
    <div class="terminal__output"></div>
    <input class="terminal__input" type="text" aria-label="Terminal input">
  </div>

  <script src="content-data.js"></script>
  <script src="main.js" type="module" defer></script>
</body>
</html>
